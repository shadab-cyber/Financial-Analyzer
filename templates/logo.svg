<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <defs>
    <linearGradient id="monoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a3050;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#1d3557;stop-opacity:1"/>
    </linearGradient>
    <filter id="arrowglow">
      <feGaussianBlur stdDeviation="2.5" result="coloredBlur"/>
      <feMerge><feMergeNode in="coloredBlur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Rounded square background -->
  <rect width="200" height="200" rx="44" fill="url(#monoGrad)"/>
  <!-- Subtle inner border -->
  <rect x="3" y="3" width="194" height="194" rx="42" fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="2"/>

  <!-- === F letter === -->
  <!-- Vertical stroke of F -->
  <line x1="30" y1="36" x2="30" y2="164" stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Top horizontal of F -->
  <line x1="30" y1="36" x2="86" y2="36"  stroke="white" stroke-width="18" stroke-linecap="round"/>
  <!-- Middle horizontal of F -->
  <line x1="30" y1="100" x2="74" y2="100" stroke="white" stroke-width="16" stroke-linecap="round"/>

  <!-- === A letter === -->
  <!-- Left leg of A -->
  <line x1="104" y1="164" x2="150" y2="36" stroke="white" stroke-width="17" stroke-linecap="round"/>
  <!-- Right leg of A -->
  <line x1="196" y1="164" x2="150" y2="36" stroke="white" stroke-width="17" stroke-linecap="round"/>

  <!-- Arrow crossbar (replaces flat A crossbar) -->
  <!-- Left arm of chevron -->
  <line x1="112" y1="118" x2="150" y2="82" stroke="#a8dadc" stroke-width="14" stroke-linecap="round" filter="url(#arrowglow)"/>
  <!-- Right arm of chevron -->
  <line x1="188" y1="118" x2="150" y2="82" stroke="#a8dadc" stroke-width="14" stroke-linecap="round" filter="url(#arrowglow)"/>
</svg>
